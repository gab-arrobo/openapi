    TrafficCorrelationInfo:
      description: |
        Contains the information for traffic correlation.
      example:
        tfcCorrId: tfcCorrId
        notifUri: notifUri
        fqdnRange:
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        corrType: COMMON_DNAI
        comEasIpv4Addr: 198.51.100.1
        notifCorrId: notifCorrId
        comEasIpv6Addr: 2001:db8:85a3::8a2e:370:7334
      nullable: true
      properties:
