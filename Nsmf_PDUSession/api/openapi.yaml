              SEAT: SEAT
              POD: POD
              RDBR: RDBR
              method: method
              LMK: LMK
              POM: POM
              ADDCODE: ADDCODE
              RD: RD
              PC: PC
              PCN: PCN
              NAM: NAM
              BLD: BLD
              ROOM: ROOM
              RDSUBBR: RDSUBBR
          trackingAreaList:
          - tac: tac
            nid: nid
            plmnId:
              mnc: mnc
              mcc: mcc
          - tac: tac
            nid: nid
            plmnId:
              mnc: mnc
              mcc: mcc
        ecsServerAddr:
          ecsFqdnList:
          - null
          - null
          ecsUriList:
          - null
          - null
          ecsProviderId: ecsProviderId
          ecsIpAddressList:
          - ipv6Addr: 2001:db8:85a3::8a2e:370:7334
            ipv4Addr: 198.51.100.1
            ipv6Prefix: 2001:db8:abcd:12::0/64
          - ipv6Addr: 2001:db8:85a3::8a2e:370:7334
            ipv4Addr: 198.51.100.1
            ipv6Prefix: 2001:db8:abcd:12::0/64
      nullable: true
      properties:
        ecsServerAddr:
          $ref: '#/components/schemas/EcsServerAddr'
        spatialValidityCond:
          $ref: '#/components/schemas/SpatialValidityCond'
        dnn:
          description: |
            String representing a Data Network as defined in clause 9A of 3GPP TS 23.003;  it shall contain either a DNN Network Identifier, or a full DNN with both the Network  Identifier and Operator Identifier, as specified in 3GPP TS 23.003 clause 9.1.1 and 9.1.2. It shall be coded as string in which the labels are separated by dots  (e.g. "Label1.Label2.Label3").
          type: string
        snssai:
          $ref: '#/components/schemas/Snssai'
      type: object
    PduSessionType:
      description: "PduSessionType indicates the type of a PDU session. It shall comply\
        \ with the provisions defined in table 5.4.3.3-1. \n"
      enum:
      - IPV4
      - IPV6
      - IPV4V6
      - UNSTRUCTURED
      - ETHERNET
      type: string
    Ambr:
      description: Contains the maximum aggregated uplink and downlink bit rates.
      example:
        uplink: uplink
        downlink: downlink
      properties:
        uplink:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          type: string
        downlink:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          type: string
      required:
      - downlink
      - uplink
      type: object
    BitRate:
      description: |
        String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
      pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
      type: string
    Ipv6Prefix:
      description: |
        String identifying an IPv6 address prefix formatted according to clause 4 of RFC 5952. IPv6Prefix data type may contain an individual /128 IPv6 address.
      example: 2001:db8:abcd:12::0/64
      type: string
    UpSecurity:
      description: Contains Userplain security information.
      example:
        upIntegr: REQUIRED
        upConfid: REQUIRED
      properties:
        upIntegr:
          $ref: '#/components/schemas/UpIntegrity'
        upConfid:
          $ref: '#/components/schemas/UpConfidentiality'
      required:
      - upConfid
      - upIntegr
      type: object
    UpIntegrity:
      description: "indicates whether UP integrity protection is required, preferred\
        \ or not needed for all the traffic on the PDU Session. It shall comply with\
        \ the provisions defined in  table 5.4.3.4-1. \n"
      enum:
      - REQUIRED
      - PREFERRED
      - NOT_NEEDED
      type: string
    UpConfidentiality:
      description: |
        indicates whether UP confidentiality protection is required, preferred or not needed for all the traffic on the PDU Session. It shall comply with the provisions defined in table 5.4.3.5-1.
      enum:
      - REQUIRED
      - PREFERRED
      - NOT_NEEDED
      type: string
    IpIndex:
      description: |
        Represents information that identifies which IP pool or external server is used to allocate the IP address.
      type: integer
    SecondaryRatUsageReport:
      description: Secondary RAT Usage Report to report usage data for a secondary
        RAT for QoS flows.
      example:
        qosFlowsUsageData:
        - downlinkVolume: 5
          startTimeStamp: 2000-01-23T04:56:07.000+00:00
          qfi: 9
          endTimeStamp: 2000-01-23T04:56:07.000+00:00
          uplinkVolume: 5
        - downlinkVolume: 5
          startTimeStamp: 2000-01-23T04:56:07.000+00:00
          qfi: 9
          endTimeStamp: 2000-01-23T04:56:07.000+00:00
          uplinkVolume: 5
        secondaryRatType: NR
      properties:
        secondaryRatType:
          $ref: '#/components/schemas/RatType'
        qosFlowsUsageData:
          items:
            $ref: '#/components/schemas/QosFlowUsageReport'
          minItems: 1
          type: array
      required:
      - qosFlowsUsageData
      - secondaryRatType
      type: object
    Arp:
      description: Contains Allocation and Retention Priority information.
      example:
        priorityLevel: 9
        preemptCap: NOT_PREEMPT
        preemptVuln: NOT_PREEMPTABLE
      properties:
        priorityLevel:
          description: "nullable true shall not be used for this attribute. Unsigned\
            \ integer indicating the ARP Priority Level (see clause 5.7.2.2 of 3GPP\
            \ TS 23.501, within the range 1 to 15.Values are ordered in decreasing\
            \ order of priority, i.e. with 1 as the highest priority and 15 as the\
            \ lowest priority. \n"
          maximum: 15
          minimum: 1
          nullable: true
          type: integer
        preemptCap:
          $ref: '#/components/schemas/PreemptionCapability'
        preemptVuln:
          $ref: '#/components/schemas/PreemptionVulnerability'
      required:
      - preemptCap
      - preemptVuln
      - priorityLevel
      type: object
    ArpPriorityLevel:
      description: "nullable true shall not be used for this attribute. Unsigned integer\
        \ indicating the ARP Priority Level (see clause 5.7.2.2 of 3GPP TS 23.501,\
        \ within the range 1 to 15.Values are ordered in decreasing order of priority,\
        \ i.e. with 1 as the highest priority and 15 as the lowest priority. \n"
      maximum: 15
      minimum: 1
      nullable: true
      type: integer
    PreemptionCapability:
      description: |
        The enumeration PreemptionCapability indicates the pre-emption capability of a request on other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.1-1.
      enum:
      - NOT_PREEMPT
      - MAY_PREEMPT
      type: string
    PreemptionVulnerability:
      description: |
        The enumeration PreemptionVulnerability indicates the pre-emption vulnerability of the QoS flow to pre-emption from other QoS flows. See clause 5.7.2.2 of 3GPP TS 23.501. It shall comply with the provisions defined in table 5.5.3.2-1
      enum:
      - NOT_PREEMPTABLE
      - PREEMPTABLE
      type: string
    fiveQi:
      description: |
        Unsigned integer representing a 5G QoS Identifier (see clause 5.7.2.1 of 3GPP TS 23.501, within the range 0 to 255.
      maximum: 255
      minimum: 0
      type: integer
    NonDynamic5Qi:
      description: |
        It indicates the QoS Characteristics for a standardized or pre-configured 5QI for downlink and uplink.
      example:
        extMaxDataBurstVol: 725830
        priorityLevel: 30
        maxDataBurstVol: 3809
        cnPacketDelayBudgetDl: 1
        cnPacketDelayBudgetUl: 1
        averWindow: 2891
      minProperties: 0
      properties:
        priorityLevel:
          description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
            \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values\
            \ are ordered in decreasing order of priority,  i.e. with 1 as the highest\
            \ priority and 127 as the lowest priority. \n"
          maximum: 127
          minimum: 1
          type: integer
        averWindow:
          default: 2000
          description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
            \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
          maximum: 4095
          minimum: 1
          type: integer
        maxDataBurstVol:
          description: "Unsigned integer indicating Maximum Data Burst Volume (see\
            \ clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
          maximum: 4095
          minimum: 1
          type: integer
        extMaxDataBurstVol:
          description: "Unsigned integer indicating Maximum Data Burst Volume (see\
            \ clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
          maximum: 2000000
          minimum: 4096
          type: integer
        cnPacketDelayBudgetDl:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
          minimum: 1
          type: integer
        cnPacketDelayBudgetUl:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
          minimum: 1
          type: integer
      type: object
    fiveQiPriorityLevel:
      description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
        \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values are\
        \ ordered in decreasing order of priority,  i.e. with 1 as the highest priority\
        \ and 127 as the lowest priority. \n"
      maximum: 127
      minimum: 1
      type: integer
    AverWindow:
      default: 2000
      description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
        \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
      maximum: 4095
      minimum: 1
      type: integer
    MaxDataBurstVol:
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses\
        \ 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
      maximum: 4095
      minimum: 1
      type: integer
    ExtMaxDataBurstVol:
      description: "Unsigned integer indicating Maximum Data Burst Volume (see clauses\
        \ 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
      maximum: 2000000
      minimum: 4096
      type: integer
    ExtPacketDelBudget:
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
      minimum: 1
      type: integer
    Dynamic5Qi:
      description: |
        It indicates the QoS Characteristics for a Non-standardised or not pre-configured 5QI for downlink and uplink.
      example:
        extMaxDataBurstVol: 1370662
        priorityLevel: 94
        extPacketDelBudget: 1
        maxDataBurstVol: 610
        packetErrRate: packetErrRate
        cnPacketDelayBudgetDl: 1
        cnPacketDelayBudgetUl: 1
        averWindow: 420
        resourceType: NON_GBR
        packetDelayBudget: 1
      properties:
        resourceType:
          $ref: '#/components/schemas/QosResourceType'
        priorityLevel:
          description: "Unsigned integer indicating the 5QI Priority Level (see clauses\
            \ 5.7.3.3 and 5.7.4 of 3GPP TS 23.501, within the range 1 to 127.Values\
            \ are ordered in decreasing order of priority,  i.e. with 1 as the highest\
            \ priority and 127 as the lowest priority. \n"
          maximum: 127
          minimum: 1
          type: integer
        packetDelayBudget:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
          minimum: 1
          type: integer
        packetErrRate:
          description: |
            String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
          pattern: "^([0-9]E-[0-9])$"
          type: string
        averWindow:
          default: 2000
          description: "Unsigned integer indicating Averaging Window (see clause 5.7.3.6\
            \ and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds. \n"
          maximum: 4095
          minimum: 1
          type: integer
        maxDataBurstVol:
          description: "Unsigned integer indicating Maximum Data Burst Volume (see\
            \ clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
          maximum: 4095
          minimum: 1
          type: integer
        extMaxDataBurstVol:
          description: "Unsigned integer indicating Maximum Data Burst Volume (see\
            \ clauses 5.7.3.7 and 5.7.4 of 3GPP TS 23.501), expressed in Bytes. \n"
          maximum: 2000000
          minimum: 4096
          type: integer
        extPacketDelBudget:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
          minimum: 1
          type: integer
        cnPacketDelayBudgetDl:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
          minimum: 1
          type: integer
        cnPacketDelayBudgetUl:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
          minimum: 1
          type: integer
      required:
      - packetDelayBudget
      - packetErrRate
      - priorityLevel
      - resourceType
      type: object
    QosResourceType:
      description: "The enumeration QosResourceType indicates whether a QoS Flow is\
        \ non-GBR, delay critical GBR, or non-delay critical GBR (see clauses 5.7.3.4\
        \ and 5.7.3.5 of 3GPP TS 23.501). It shall comply with the provisions defined\
        \ in table 5.5.3.6-1. \n"
      enum:
      - NON_GBR
      - NON_CRITICAL_GBR
      - CRITICAL_GBR
      type: string
    PacketDelBudget:
      description: |
        Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501), expressed in milliseconds.
      minimum: 1
      type: integer
    PacketErrRate:
      description: |
        String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
      pattern: "^([0-9]E-[0-9])$"
      type: string
    ReflectiveQoSAttribute:
      description: "The enumeration ReflectiveQosAttribute indicates whether certain\
        \ traffic of the QoS flow may be subject to Reflective QoS (see clause 5.7.2.3\
        \ of 3GPP TS 23.501). It shall comply with the provisions defined in table\
        \ 5.5.3.3-1. \n"
      enum:
      - RQOS
      - NO_RQOS
      type: string
    AdditionalQosFlowInfo:
      anyOf:
      - enum:
        - MORE_LIKELY
        type: string
      - type: string
      nullable: true
    NullValue:
      description: JSON's null value.
      enum:
      - null
      type: string
    PduSetQosPara:
      description: Represents the PDU Set level QoS parameters.
      example:
        pduSetDelayBudget: 1
        pduSetHandlingInfo: ALL_PDUS_NEEDED
        pduSetErrRate: pduSetErrRate
      properties:
        pduSetDelayBudget:
          description: |
            Unsigned integer indicating Packet Delay Budget (see clauses 5.7.3.4 and 5.7.4 of 3GPP TS 23.501 [8])), expressed in 0.01 milliseconds.
          minimum: 1
          type: integer
        pduSetErrRate:
          description: |
            String representing Packet Error Rate (see clause 5.7.3.5 and 5.7.4 of 3GPP TS 23.501, expressed as a "scalar x 10-k" where the scalar and the exponent k are each encoded as one decimal digit.
          pattern: "^([0-9]E-[0-9])$"
          type: string
        pduSetHandlingInfo:
          $ref: '#/components/schemas/PduSetHandlingInfo'
      type: object
    PduSetHandlingInfo:
      description: |
        Possible values are:
        - "ALL_PDUS_NEEDED": All PDUs of the PDU Set are needed
        - "ALL_PDUS_NOT_NEEDED": All PDUs of the PDU Set are not needed
      enum:
      - ALL_PDUS_NEEDED
      - ALL_PDUS_NOT_NEEDED
      type: string
    NotificationControl:
      description: "The enumeration NotificationControl indicates whether notifications\
        \ are requested from the RAN when the GFBR can no longer  (or again) be fulfilled\
        \ for a QoS Flow during the lifetime of the QoS Flow (see clause 5.7.2.4 of\
        \ 3GPP TS 23.501). It shall comply with the provisions defined in table 5.5.3.5-1.\
        \ \n"
      enum:
      - REQUESTED
      - NOT_REQUESTED
      type: string
    PacketLossRate:
      description: |
        Unsigned integer indicating Packet Loss Rate (see clauses 5.7.2.8 and 5.7.4 of 3GPP TS 23.501), expressed in tenth of percent.
      maximum: 1000
      minimum: 0
      type: integer
    OffloadIdentifier:
      description: |
        Offload identifier uniquely identifying a VPLMN offloading policy information instance
      pattern: "^[0-9]{3}-[0-9]{2,3}-[A-Fa-f0-9]{8}(-v[0-9]{1,2}){0,1}$"
      type: string
    ChargingInformation:
      description: Contains the addresses of the charging functions.
      example:
        primaryChfSetId: primaryChfSetId
        secondaryChfInstanceId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        secondaryChfSetId: secondaryChfSetId
        secondaryChfAddress: secondaryChfAddress
        primaryChfAddress: primaryChfAddress
        primaryChfInstanceId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
      properties:
        primaryChfAddress:
          description: String providing an URI formatted according to RFC 3986.
          type: string
        secondaryChfAddress:
          description: String providing an URI formatted according to RFC 3986.
          type: string
        primaryChfSetId:
          description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted\
            \ as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
            , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with \
            \ <MCC> encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)\
            \  <MNC> encoding the Mobile Network Code part of the PLMN, comprising\
            \ 3 digits. \n  If there are only 2 significant digits in the MNC, one\
            \ \"0\" digit shall be inserted \n  at the left side to fill the 3 digits\
            \ coding of MNC.  Pattern: '^[0-9]{3}$'\n<NFType> encoded as a value defined\
            \ in Table 6.1.6.3.3-1 of 3GPP TS 29.510 but \n  with lower case characters\
            \ <Set ID> encoded as a string of characters consisting of \n  alphabetic\
            \ characters (A-Z and a-z), digits (0-9) and/or the hyphen (-) and that\
            \ \n  shall end with either an alphabetic character or a digit. \n"
          type: string
        primaryChfInstanceId:
          description: "String uniquely identifying a NF instance. The format of the\
            \ NF Instance ID shall be a  Universally Unique Identifier (UUID) version\
            \ 4, as described in IETF RFC 4122. \n"
          format: uuid
          type: string
        secondaryChfSetId:
          description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted\
            \ as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
            , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with \
            \ <MCC> encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)\
            \  <MNC> encoding the Mobile Network Code part of the PLMN, comprising\
            \ 3 digits. \n  If there are only 2 significant digits in the MNC, one\
            \ \"0\" digit shall be inserted \n  at the left side to fill the 3 digits\
            \ coding of MNC.  Pattern: '^[0-9]{3}$'\n<NFType> encoded as a value defined\
            \ in Table 6.1.6.3.3-1 of 3GPP TS 29.510 but \n  with lower case characters\
            \ <Set ID> encoded as a string of characters consisting of \n  alphabetic\
            \ characters (A-Z and a-z), digits (0-9) and/or the hyphen (-) and that\
            \ \n  shall end with either an alphabetic character or a digit. \n"
          type: string
        secondaryChfInstanceId:
          description: "String uniquely identifying a NF instance. The format of the\
            \ NF Instance ID shall be a  Universally Unique Identifier (UUID) version\
            \ 4, as described in IETF RFC 4122. \n"
          format: uuid
          type: string
      required:
      - primaryChfAddress
      type: object
    VplmnOffloadingInfo:
      description: VPLMN Specific Offloading Information
      example:
        ipv4AddrMasks:
        - 198.51.0.0/16
        - 198.51.0.0/16
        ipv6AddressRanges:
        - start: 2001:db8:85a3::8a2e:370:7334
          end: 2001:db8:85a3::8a2e:370:7334
        - start: 2001:db8:85a3::8a2e:370:7334
          end: 2001:db8:85a3::8a2e:370:7334
        ipv6PrefixRanges:
        - start: 2001:db8:abcd:12::0/64
          end: 2001:db8:abcd:12::0/64
        - start: 2001:db8:abcd:12::0/64
          end: 2001:db8:abcd:12::0/64
        fqdnPatterns:
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        - regex: regex
          stringMatchingRule:
            stringMatchingConditions:
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
            - matchingString: matchingString
              matchingOperator: FULL_MATCH
        allowedTraffic: true
        offloadIdentifier: offloadIdentifier
        sessionDIAmbr: sessionDIAmbr
        vplmnId:
          mnc: mnc
          mcc: mcc
        fqdnList:
        - null
        - null
        ipv4AddressRanges:
        - start: 198.51.100.1
          end: 198.51.100.1
        - start: 198.51.100.1
          end: 198.51.100.1
      nullable: true
      properties:
        offloadIdentifier:
          description: |
            Offload identifier uniquely identifying a VPLMN offloading policy information instance
          pattern: "^[0-9]{3}-[0-9]{2,3}-[A-Fa-f0-9]{8}(-v[0-9]{1,2}){0,1}$"
          type: string
        vplmnId:
          $ref: '#/components/schemas/PlmnId'
        allowedTraffic:
          default: true
          type: boolean
        ipv4AddressRanges:
          items:
            $ref: '#/components/schemas/Ipv4AddressRange'
          minItems: 1
          type: array
        ipv4AddrMasks:
          items:
            $ref: '#/components/schemas/Ipv4AddrMask'
          minItems: 1
          type: array
        ipv6AddressRanges:
          items:
            $ref: '#/components/schemas/Ipv6AddressRange'
          minItems: 1
          type: array
        ipv6PrefixRanges:
          items:
            $ref: '#/components/schemas/Ipv6PrefixRange'
          minItems: 1
          type: array
        fqdnList:
          items:
            $ref: '#/components/schemas/Fqdn'
          minItems: 1
          type: array
        fqdnPatterns:
          items:
            $ref: '#/components/schemas/FqdnPatternMatchingRule'
          minItems: 1
          type: array
        sessionDIAmbr:
          description: |
            String representing a bit rate; the prefixes follow the standard symbols from The International System of Units, and represent x1000 multipliers, with the exception that prefix "K" is used to represent the standard symbol "k".
          pattern: ^\d+(\.\d+)? (bps|Kbps|Mbps|Gbps|Tbps)$
          type: string
      type: object
    Ipv4AddressRange:
      description: Range of IPv4 addresses
      example:
        start: 198.51.100.1
        end: 198.51.100.1
      properties:
        start:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          type: string
        end:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          type: string
      required:
      - end
      - start
      type: object
    Ipv4AddrMask:
      description: |
        "String identifying a IPv4 address mask formatted in the 'dotted decimal' notation as defined in RFC 1166."
      example: 198.51.0.0/16
      pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])(\\\
        /([0-9]|[1-2][0-9]|3[0-2]))$"
      type: string
    Ipv6AddressRange:
      description: Range of IPv6 addresses
      example:
        start: 2001:db8:85a3::8a2e:370:7334
        end: 2001:db8:85a3::8a2e:370:7334
      properties:
        start:
          $ref: '#/components/schemas/Ipv6Addr'
        end:
          $ref: '#/components/schemas/Ipv6Addr'
      required:
      - end
      - start
      type: object
    Ipv6PrefixRange:
      description: Range of IPv6 prefixes
      example:
        start: 2001:db8:abcd:12::0/64
        end: 2001:db8:abcd:12::0/64
      properties:
        start:
          $ref: '#/components/schemas/Ipv6Prefix'
        end:
          $ref: '#/components/schemas/Ipv6Prefix'
      required:
      - end
      - start
      type: object
    FqdnPatternMatchingRule:
      description: a matching rule for a FQDN pattern
      example:
        regex: regex
        stringMatchingRule:
          stringMatchingConditions:
          - matchingString: matchingString
            matchingOperator: FULL_MATCH
          - matchingString: matchingString
            matchingOperator: FULL_MATCH
      nullable: true
      oneOf: []
      properties:
        regex:
          type: string
        stringMatchingRule:
          $ref: '#/components/schemas/StringMatchingRule'
      type: object
    StringMatchingRule:
      description: A list of conditions for string matching
      example:
        stringMatchingConditions:
        - matchingString: matchingString
          matchingOperator: FULL_MATCH
        - matchingString: matchingString
          matchingOperator: FULL_MATCH
      properties:
        stringMatchingConditions:
          items:
            $ref: '#/components/schemas/StringMatchingCondition'
          minItems: 1
          type: array
      type: object
    StringMatchingCondition:
      description: A String with Matching Operator
      example:
        matchingString: matchingString
        matchingOperator: FULL_MATCH
      properties:
        matchingString:
          type: string
        matchingOperator:
          $ref: '#/components/schemas/MatchingOperator'
      required:
      - matchingOperator
      type: object
    MatchingOperator:
      description: the matching operation.
      enum:
      - FULL_MATCH
      - MATCH_ALL
      - STARTS_WITH
      - NOT_START_WITH
      - ENDS_WITH
      - NOT_END_WITH
      - CONTAINS
      - NOT_CONTAIN
      type: string
    Uint16:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 16-bit integer.
      maximum: 65535
      minimum: 0
      type: integer
    StationaryIndication:
      description: |
        Possible values are:
        - STATIONARY: Identifies the UE is stationary
        - MOBILE: Identifies the UE is mobile
      enum:
      - STATIONARY
      - MOBILE
      type: string
    ScheduledCommunicationTime:
      description: Identifies time and day of the week when the UE is available for
        communication.
      example:
        timeOfDayEnd: timeOfDayEnd
        daysOfWeek:
        - null
        - null
        - null
        - null
        - null
        timeOfDayStart: timeOfDayStart
      properties:
        daysOfWeek:
          description: |
            Identifies the day(s) of the week. If absent, it indicates every day of the week.
          items:
            $ref: '#/components/schemas/DayOfWeek'
          maxItems: 6
          minItems: 1
          type: array
        timeOfDayStart:
          description: "String with format partial-time or full-time as defined in\
            \ clause 5.6 of IETF RFC 3339. Examples, 20:15:00, 20:15:00-08:00 (for\
            \ 8 hours behind UTC). \n"
          type: string
        timeOfDayEnd:
          description: "String with format partial-time or full-time as defined in\
            \ clause 5.6 of IETF RFC 3339. Examples, 20:15:00, 20:15:00-08:00 (for\
            \ 8 hours behind UTC). \n"
          type: string
      type: object
    DayOfWeek:
      description: |
        integer between and including 1 and 7 denoting a weekday. 1 shall indicate Monday, and the subsequent weekdays shall be indicated with the next higher numbers. 7 shall indicate Sunday.
      maximum: 7
      minimum: 1
      type: integer
    TimeOfDay:
      description: "String with format partial-time or full-time as defined in clause\
        \ 5.6 of IETF RFC 3339. Examples, 20:15:00, 20:15:00-08:00 (for 8 hours behind\
        \ UTC). \n"
      type: string
    ScheduledCommunicationType:
      description: |
        Possible values are:
        -DOWNLINK_ONLY: Downlink only
        -UPLINK_ONLY: Uplink only
        -BIDIRECTIONA: Bi-directional
      enum:
      - DOWNLINK_ONLY
      - UPLINK_ONLY
      - BIDIRECTIONAL
      type: string
    TrafficProfile:
      description: "Possible values are:\n- SINGLE_TRANS_UL: Uplink single packet\
        \ transmission.\n- SINGLE_TRANS_DL: Downlink single packet transmission.\n\
        - DUAL_TRANS_UL_FIRST: Dual packet transmission, firstly uplink packet transmission\n\
        \  with subsequent downlink packet transmission.\n- DUAL_TRANS_DL_FIRST: Dual\
        \ packet transmission, firstly downlink packet transmission\n  with subsequent\
        \ uplink packet transmission. \n"
      enum:
      - SINGLE_TRANS_UL
      - SINGLE_TRANS_DL
      - DUAL_TRANS_UL_FIRST
      - DUAL_TRANS_DL_FIRST
      - MULTI_TRANS
      type: string
    BatteryIndication:
      description: |
        Parameters "replaceableInd" and "rechargeableInd" are only included if the value of Parameter "batteryInd" is true.
      example:
        replaceableInd: true
        batteryInd: true
        rechargeableInd: true
      properties:
        batteryInd:
          description: |
            This IE shall indicate whether the UE is battery powered or not. true: the UE is battery powered; false or absent: the UE is not battery powered
          type: boolean
        replaceableInd:
          description: |
            This IE shall indicate whether the battery of the UE is replaceable or not. true: the battery of the UE is replaceable; false or absent: the battery of the UE is not replaceable.
          type: boolean
        rechargeableInd:
          description: |
            This IE shall indicate whether the battery of the UE is rechargeable or not. true: the battery of UE is rechargeable; false or absent: the battery of the UE is not rechargeable.
          type: boolean
      type: object
    DddTrafficDescriptor:
      description: Contains a Traffic Descriptor.
      example:
        ipv6Addr: 2001:db8:85a3::8a2e:370:7334
        ipv4Addr: 198.51.100.1
        portNumber: 0
        macAddr: macAddr
      properties:
        ipv4Addr:
          description: |
            String identifying a IPv4 address formatted in the 'dotted decimal' notation as defined in RFC 1166.
          example: 198.51.100.1
          pattern: "^(([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])\\.){3}([0-9]|[1-9][0-9]|1[0-9][0-9]|2[0-4][0-9]|25[0-5])$"
          type: string
        ipv6Addr:
          $ref: '#/components/schemas/Ipv6Addr'
        portNumber:
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          type: integer
        macAddr:
          description: |
            String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
          pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
          type: string
      type: object
    MacAddr48:
      description: |
        String identifying a MAC address formatted in the hexadecimal notation according to clause 1.1 and clause 2.1 of RFC 7042.
      pattern: "^([0-9a-fA-F]{2})((-[0-9a-fA-F]{2}){5})$"
      type: string
    GroupId:
      description: "String identifying a group of devices network internal globally\
        \ unique ID which identifies a set of IMSIs, as specified in clause 19.9 of\
        \ 3GPP TS 23.003. \n"
      pattern: "^[A-Fa-f0-9]{8}-[0-9]{3}-[0-9]{2,3}-([A-Fa-f0-9][A-Fa-f0-9]){1,10}$"
      type: string
    Uint32:
      description: |
        Integer where the allowed values correspond to the value range of an unsigned 32-bit integer.
      maximum: 4294967295
      minimum: 0
      type: integer
    Int32:
      description: string with format 'int32' as defined in OpenAPI.
      format: int32
      type: integer
    TrafficControlData:
      description: |
        Contains parameters determining how flows associated with a PCC Rule are treated (e.g.  blocked, redirected, etc).
      example:
        simConnInd: true
        redirectInfo:
          redirectServerAddress: redirectServerAddress
          redirectEnabled: true
          redirectAddressType: IPV4_ADDR
        trafficSteeringPolIdUl: trafficSteeringPolIdUl
        metadata: metadata
        addRedirectInfo:
        - redirectServerAddress: redirectServerAddress
          redirectEnabled: true
          redirectAddressType: IPV4_ADDR
        - redirectServerAddress: redirectServerAddress
          redirectEnabled: true
          redirectAddressType: IPV4_ADDR
        traffCorreInd: true
        simConnTerm: 6
        maxAllowedUpLat: 0
        tfcCorreInfo:
          tfcCorrId: tfcCorrId
          notifUri: notifUri
          fqdnRange:
          - regex: regex
            stringMatchingRule:
              stringMatchingConditions:
              - matchingString: matchingString
                matchingOperator: FULL_MATCH
              - matchingString: matchingString
                matchingOperator: FULL_MATCH
          - regex: regex
            stringMatchingRule:
              stringMatchingConditions:
              - matchingString: matchingString
                matchingOperator: FULL_MATCH
              - matchingString: matchingString
                matchingOperator: FULL_MATCH
          corrType: COMMON_DNAI
          comEasIpv4Addr: 198.51.100.1
          notifCorrId: notifCorrId
          comEasIpv6Addr: 2001:db8:85a3::8a2e:370:7334
        datEndMarkInd: true
        l4sInd: UL
        mulAccCtrl: ALLOWED
        steerModeDl:
          steerModeValue: ACTIVE_STANDBY
          thresValue:
            rttThres: 0
            plrThres: 896
          standby: null
          prioAcc: null
          active: null
          "3gLoad": 0
          steerModeInd: AUTO_LOAD_BALANCE
          primary: null
        muteNotif: true
        trafficSteeringPolIdDl: trafficSteeringPolIdDl
        easIpReplaceInfos:
        - source:
            port: 0
            ip:
              ipv6Addr: 2001:db8:85a3::8a2e:370:7334
              ipv4Addr: 198.51.100.1
              ipv6Prefix: 2001:db8:abcd:12::0/64
          target:
            port: 0
            ip:
              ipv6Addr: 2001:db8:85a3::8a2e:370:7334
              ipv4Addr: 198.51.100.1
              ipv6Prefix: 2001:db8:abcd:12::0/64
        - source:
            port: 0
            ip:
              ipv6Addr: 2001:db8:85a3::8a2e:370:7334
              ipv4Addr: 198.51.100.1
              ipv6Prefix: 2001:db8:abcd:12::0/64
          target:
            port: 0
            ip:
              ipv6Addr: 2001:db8:85a3::8a2e:370:7334
              ipv4Addr: 198.51.100.1
              ipv6Prefix: 2001:db8:abcd:12::0/64
        upPathChgEvent:
          dnaiChgType: EARLY
          notifCorreId: notifCorreId
          notificationUri: notificationUri
          afAckInd: true
        transMode: DATAGRAM_MODE_1
        steerFun: MPTCP
        steerModeUl:
          steerModeValue: ACTIVE_STANDBY
          thresValue:
            rttThres: 0
            plrThres: 896
          standby: null
          prioAcc: null
          active: null
          "3gLoad": 0
          steerModeInd: AUTO_LOAD_BALANCE
          primary: null
        tcId: tcId
        flowStatus: ENABLED-UPLINK
        routeToLocs:
        - dnai: dnai
          routeInfo:
            ipv6Addr: 2001:db8:85a3::8a2e:370:7334
            ipv4Addr: 198.51.100.1
            portNumber: 0
          routeProfId: routeProfId
        - dnai: dnai
          routeInfo:
            ipv6Addr: 2001:db8:85a3::8a2e:370:7334
            ipv4Addr: 198.51.100.1
            portNumber: 0
          routeProfId: routeProfId
        candDnaiInd: true
      nullable: true
      properties:
        tcId:
          description: Univocally identifies the traffic control policy data within
            a PDU session.
          type: string
        l4sInd:
          $ref: '#/components/schemas/UplinkDownlinkSupport'
        flowStatus:
          $ref: '#/components/schemas/FlowStatus'
        redirectInfo:
          $ref: '#/components/schemas/RedirectInformation'
        addRedirectInfo:
          items:
            $ref: '#/components/schemas/RedirectInformation'
          minItems: 1
          type: array
        muteNotif:
          description: Indicates whether applicat'on's start or stop notification
            is to be muted.
          type: boolean
        trafficSteeringPolIdDl:
          description: |
            Reference to a pre-configured traffic steering policy for downlink traffic at the SMF.
          nullable: true
          type: string
        trafficSteeringPolIdUl:
          description: |
            Reference to a pre-configured traffic steering policy for uplink traffic at the SMF.
          nullable: true
          type: string
        metadata:
          description: |
            A String which is transparently passed to the UPF to be applied for traffic to SFC.
          format: byte
          nullable: true
          type: string
        routeToLocs:
          description: A list of location which the traffic shall be routed to for
            the AF request
          items:
            $ref: '#/components/schemas/RouteToLocation'
          minItems: 1
          nullable: true
          type: array
        maxAllowedUpLat:
          description: |
            Unsigned Integer, i.e. only value 0 and integers above 0 are permissible with the OpenAPI 'nullable: true' property.
          minimum: 0
          nullable: true
          type: integer
        easIpReplaceInfos:
          description: Contains EAS IP replacement information.
          items:
            $ref: '#/components/schemas/EasIpReplacementInfo'
          minItems: 1
          nullable: true
          type: array
        traffCorreInd:
          type: boolean
        tfcCorreInfo:
          $ref: '#/components/schemas/TrafficCorrelationInfo'
        simConnInd:
          description: |
            Indicates whether simultaneous connectivity should be temporarily maintained for the  source and target PSA.
          type: boolean
        simConnTerm:
          description: indicating a time in seconds.
          type: integer
        upPathChgEvent:
          $ref: '#/components/schemas/UpPathChgEvent'
        steerFun:
          $ref: '#/components/schemas/SteeringFunctionality'
        transMode:
          $ref: '#/components/schemas/TransportMode'
        steerModeDl:
          $ref: '#/components/schemas/SteeringMode'
        steerModeUl:
          $ref: '#/components/schemas/SteeringMode'
        mulAccCtrl:
          $ref: '#/components/schemas/MulticastAccessControl'
        candDnaiInd:
          description: |
            Indication of reporting candidate DNAI(s). If it is included and set to "true", the candidate DNAI(s) for the PDU session need to be reported. Otherwise set to "false" or omitted.
          type: boolean
        datEndMarkInd:
          description: |
            The data burst end marking is enabled if it is set to "true". Default value is "false" if omitted.
          type: boolean
      required:
      - tcId
      type: object
    RedirectInformation:
      description: Contains the redirect information.
      example:
        redirectServerAddress: redirectServerAddress
        redirectEnabled: true
        redirectAddressType: IPV4_ADDR
      properties:
        redirectEnabled:
          description: Indicates the redirect is enable.
          type: boolean
        redirectAddressType:
          $ref: '#/components/schemas/RedirectAddressType'
        redirectServerAddress:
          description: |
            Indicates the address of the redirect server. If "redirectAddressType" attribute indicates the IPV4_ADDR, the encoding is the same as the Ipv4Addr data type defined in 3GPP TS 29.571.If "redirectAddressType" attribute indicates the IPV6_ADDR, the encoding is the same as the Ipv6Addr data type defined in 3GPP TS 29.571.If "redirectAddressType" attribute indicates the URL or SIP_URI, the encoding is the same as the Uri data type defined in 3GPP TS 29.571.
          type: string
      type: object
    RedirectAddressType:
      description: "Indicates the redirect address type.  \nPossible values are\n\
        - IPV4_ADDR: Indicates that the address type is in the form of \"dotted-decimal\"\
        \ IPv4\naddress.\n- IPV6_ADDR: Indicates that the address type is in the form\
        \ of IPv6 address.\n- URL: Indicates that the address type is in the form\
        \ of Uniform Resource Locator.\n- SIP_URI: Indicates that the address type\
        \ is in the form of SIP Uniform Resource\nIdentifier.\n"
      enum:
      - IPV4_ADDR
      - IPV6_ADDR
      - URL
      - SIP_URI
      type: string
    UpPathChgEvent:
      description: Contains the UP path change event subscription from the AF.
      example:
        dnaiChgType: EARLY
        notifCorreId: notifCorreId
        notificationUri: notificationUri
        afAckInd: true
      nullable: true
      properties:
        notificationUri:
          description: String providing an URI formatted according to RFC 3986.
          type: string
        notifCorreId:
          description: |
            It is used to set the value of Notification Correlation ID in the notification sent by the SMF.
          type: string
        dnaiChgType:
          $ref: '#/components/schemas/DnaiChangeType'
        afAckInd:
          type: boolean
      required:
      - dnaiChgType
      - notifCorreId
      - notificationUri
      type: object
    SteeringFunctionality:
      description: "Indicates functionality to support traffic steering, switching\
        \ and splitting determined\nby the PCF.  \nPossible values are\n  - MPTCP:\
        \ Indicates that PCF authorizes the MPTCP functionality to support traffic\n\
        \  steering, switching and splitting.\n  - ATSSS_LL: Indicates that PCF authorizes\
        \ the ATSSS-LL functionality to support traffic\n  steering, switching and\
        \ splitting.\n"
      enum:
      - MPTCP
      - MPQUIC
      - ATSSS_LL
      type: string
    TransportMode:
      description: |
        Indicates the Transport Mode when the steering functionality is MPQUIC functionality.
      enum:
      - DATAGRAM_MODE_1
      - DATAGRAM_MODE_2
      - STREAM_MODE
      type: string
    SteeringMode:
      description: Contains the steering mode value and parameters determined by the
        PCF.
      example:
        steerModeValue: ACTIVE_STANDBY
        thresValue:
          rttThres: 0
          plrThres: 896
        standby: null
        prioAcc: null
        active: null
        "3gLoad": 0
        steerModeInd: AUTO_LOAD_BALANCE
        primary: null
      properties:
        steerModeValue:
          $ref: '#/components/schemas/SteerModeValue'
        active:
          $ref: '#/components/schemas/AccessType'
        standby:
          $ref: '#/components/schemas/AccessType'
        "3gLoad":
          description: "Unsigned Integer, i.e. only value 0 and integers above 0 are\
            \ permissible."
          minimum: 0
          type: integer
        prioAcc:
          $ref: '#/components/schemas/AccessType'
        thresValue:
          $ref: '#/components/schemas/ThresholdValue'
        steerModeInd:
          $ref: '#/components/schemas/SteerModeIndicator'
        primary:
          $ref: '#/components/schemas/AccessType'
      required:
      - steerModeValue
      type: object
    SteerModeValue:
      description: Indicates the steering mode value determined by the PCF.
      enum:
      - ACTIVE_STANDBY
      - LOAD_BALANCING
      - SMALLEST_DELAY
      - PRIORITY_BASED
      - REDUNDANT
      type: string
    ThresholdValue:
      description: Indicates the threshold value(s) for RTT and/or Packet Loss Rate.
      example:
        rttThres: 0
        plrThres: 896
      nullable: true
      properties:
        rttThres:
          description: |
            Unsigned Integer, i.e. only value 0 and integers above 0 are permissible with the OpenAPI 'nullable: true' property.
          minimum: 0
          nullable: true
          type: integer
        plrThres:
          description: |
            This data type is defined in the same way as the 'PacketLossRate' data type, but with the OpenAPI 'nullable: true' property.
          maximum: 1000
          minimum: 0
          nullable: true
          type: integer
      type: object
    SteerModeIndicator:
      description: Contains Autonomous load-balance indicator or UE-assistance indicator.
      enum:
      - AUTO_LOAD_BALANCE
      - UE_ASSISTANCE
      type: string
    MulticastAccessControl:
      description: |
        Indicates whether the service data flow, corresponding to the service data flow template, is allowed or not allowed.
      enum:
      - ALLOWED
      - NOT_ALLOWED
      type: string
    FlowInformation:
      description: Contains the flow information.
      example:
        flowLabel: flowLabel
        packFiltId: packFiltId
        flowDirection: null
        packetFilterUsage: true
        tosTrafficClass: tosTrafficClass
        spi: spi
        flowDescription: flowDescription
        ethFlowDescription:
          destMacAddr: destMacAddr
          destMacAddrEnd: destMacAddrEnd
          sourceMacAddr: sourceMacAddr
          fDir: DOWNLINK
          ethType: ethType
          fDesc: fDesc
          vlanTags:
          - vlanTags
          - vlanTags
          srcMacAddrEnd: srcMacAddrEnd
      properties:
        flowDescription:
          description: Defines a packet filter for an IP flow.
          type: string
        ethFlowDescription:
          $ref: '#/components/schemas/EthFlowDescription'
        packFiltId:
          description: An identifier of packet filter.
          type: string
        packetFilterUsage:
          description: The packet shall be sent to the UE.
          type: boolean
        tosTrafficClass:
          description: |
            Contains the Ipv4 Type-of-Service and mask field or the Ipv6 Traffic-Class field and  mask field.
          nullable: true
          type: string
        spi:
          description: the security parameter index of the IPSec packet.
          nullable: true
          type: string
        flowLabel:
          description: the Ipv6 flow label header field.
          nullable: true
          type: string
        flowDirection:
          $ref: '#/components/schemas/FlowDirection'
      type: object
    FlowDescription:
      description: Defines a packet filter for an IP flow.
      type: string
    FlowDirectionRm:
      $ref: '#/components/schemas/FlowDirection'
    FlowDirection:
      description: "Indicates the direction of the service data flow.  \nPossible\
        \ values are:\n- DOWNLINK: The corresponding filter applies for traffic to\
        \ the UE.\n- UPLINK: The corresponding filter applies for traffic from the\
        \ UE.\n- BIDIRECTIONAL: The corresponding filter applies for traffic both\
        \ to and from the UE.\n- UNSPECIFIED: The corresponding filter applies for\
        \ traffic to the UE (downlink), but has no\nspecific direction declared. The\
        \ service data flow detection shall apply the filter for\nuplink traffic as\
        \ if the filter was bidirectional. The PCF shall not use the value\nUNSPECIFIED\
        \ in filters created by the network in NW-initiated procedures. The PCF shall\
        \ only\ninclude the value UNSPECIFIED in filters in UE-initiated procedures\
        \ if the same value is\nreceived from the SMF.\n"
      enum:
      - DOWNLINK
      - UPLINK
      - BIDIRECTIONAL
      - UNSPECIFIED
      type: string
    AccessTokenErr:
      description: Error returned in the access token response message
      example:
        error_description: error_description
        error: invalid_request
        error_uri: error_uri
      properties:
        error:
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - unauthorized_client
          - unsupported_grant_type
          - invalid_scope
          type: string
        error_description:
          type: string
        error_uri:
          type: string
      required:
      - error
      type: object
    AccessTokenReq:
      description: Contains information related to the access token request
      example:
        nfInstanceId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        targetNfSetId: targetNfSetId
        hnrfAccessTokenUri: hnrfAccessTokenUri
        nfType: NRF
        requesterSnpnList:
        - mnc: mnc
          nid: nid
          mcc: mcc
        - mnc: mnc
          nid: nid
          mcc: mcc
        targetSnpn:
          mnc: mnc
          nid: nid
          mcc: mcc
        requesterPlmn:
          mnc: mnc
          mcc: mcc
        targetNfType: null
        targetNfInstanceId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        targetPlmn:
          mnc: mnc
          mcc: mcc
        requesterSnssaiList:
        - sd: sd
          sst: 153
        - sd: sd
          sst: 153
        targetNfServiceSetId: targetNfServiceSetId
        grant_type: client_credentials
        scope: scope
        targetNsiList:
        - targetNsiList
        - targetNsiList
        sourceNfInstanceId: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        targetSnssaiList:
        - sd: sd
          sst: 153
        - sd: sd
          sst: 153
        requesterPlmnList:
        - mnc: mnc
          mcc: mcc
        - mnc: mnc
          mcc: mcc
        requesterFqdn: requesterFqdn
      properties:
        grant_type:
          enum:
          - client_credentials
          type: string
        nfInstanceId:
          description: "String uniquely identifying a NF instance. The format of the\
            \ NF Instance ID shall be a  Universally Unique Identifier (UUID) version\
            \ 4, as described in IETF RFC 4122. \n"
          format: uuid
          type: string
        nfType:
          $ref: '#/components/schemas/NFType'
        targetNfType:
          $ref: '#/components/schemas/NFType'
        scope:
          pattern: "^([a-zA-Z0-9_:-]+)( [a-zA-Z0-9_:-]+)*$"
          type: string
        targetNfInstanceId:
          description: "String uniquely identifying a NF instance. The format of the\
            \ NF Instance ID shall be a  Universally Unique Identifier (UUID) version\
            \ 4, as described in IETF RFC 4122. \n"
          format: uuid
          type: string
        requesterPlmn:
          $ref: '#/components/schemas/PlmnId'
        requesterPlmnList:
          items:
            $ref: '#/components/schemas/PlmnId'
          minItems: 2
          type: array
        requesterSnssaiList:
          items:
            $ref: '#/components/schemas/Snssai'
          minItems: 1
          type: array
        requesterFqdn:
          description: Fully Qualified Domain Name
          maxLength: 253
          minLength: 4
          pattern: "^([0-9A-Za-z]([-0-9A-Za-z]{0,61}[0-9A-Za-z])?\\.)+[A-Za-z]{2,63}\\\
            .?$"
          type: string
        requesterSnpnList:
          items:
            $ref: '#/components/schemas/PlmnIdNid'
          minItems: 1
          type: array
        targetPlmn:
          $ref: '#/components/schemas/PlmnId'
        targetSnpn:
          $ref: '#/components/schemas/PlmnIdNid'
        targetSnssaiList:
          items:
            $ref: '#/components/schemas/Snssai'
          minItems: 1
          type: array
        targetNsiList:
          items:
            type: string
          minItems: 1
          type: array
        targetNfSetId:
          description: "NF Set Identifier (see clause 28.12 of 3GPP TS 23.003), formatted\
            \ as the following string \"set<Set ID>.<nftype>set.5gc.mnc<MNC>.mcc<MCC>\"\
            , or  \"set<SetID>.<NFType>set.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\" with \
            \ <MCC> encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)\
            \  <MNC> encoding the Mobile Network Code part of the PLMN, comprising\
            \ 3 digits. \n  If there are only 2 significant digits in the MNC, one\
            \ \"0\" digit shall be inserted \n  at the left side to fill the 3 digits\
            \ coding of MNC.  Pattern: '^[0-9]{3}$'\n<NFType> encoded as a value defined\
            \ in Table 6.1.6.3.3-1 of 3GPP TS 29.510 but \n  with lower case characters\
            \ <Set ID> encoded as a string of characters consisting of \n  alphabetic\
            \ characters (A-Z and a-z), digits (0-9) and/or the hyphen (-) and that\
            \ \n  shall end with either an alphabetic character or a digit. \n"
          type: string
        targetNfServiceSetId:
          description: "NF Service Set Identifier (see clause 28.12 of 3GPP TS 23.003)\
            \ formatted as the following  string \"set<Set ID>.sn<Service Name>.nfi<NF\
            \ Instance ID>.5gc.mnc<MNC>.mcc<MCC>\", or  \"set<SetID>.sn<ServiceName>.nfi<NFInstanceID>.5gc.nid<NID>.mnc<MNC>.mcc<MCC>\"\
            \ with  <MCC> encoded as defined in clause 5.4.2 (\"Mcc\" data type definition)\
            \   <MNC> encoding the Mobile Network Code part of the PLMN, comprising\
            \ 3 digits. \n  If there are only 2 significant digits in the MNC, one\
            \ \"0\" digit shall be inserted \n  at the left side to fill the 3 digits\
            \ coding of MNC.  Pattern: '^[0-9]{3}$'\n<NID> encoded as defined in clause\_\
            5.4.2 (\"Nid\" data type definition)  <NFInstanceId> encoded as defined\
            \ in clause 5.3.2  <ServiceName> encoded as defined in 3GPP TS 29.510\
            \  <Set ID> encoded as a string of characters consisting of alphabetic\
            \ \n  characters (A-Z and a-z), digits (0-9) and/or the hyphen (-) and\
            \ that shall end \n  with either an alphabetic character or a digit.\n"
          type: string
        hnrfAccessTokenUri:
          description: String providing an URI formatted according to RFC 3986.
          type: string
        sourceNfInstanceId:
          description: "String uniquely identifying a NF instance. The format of the\
            \ NF Instance ID shall be a  Universally Unique Identifier (UUID) version\
            \ 4, as described in IETF RFC 4122. \n"
          format: uuid
          type: string
      required:
      - grant_type
      - nfInstanceId
      - scope
      type: object
